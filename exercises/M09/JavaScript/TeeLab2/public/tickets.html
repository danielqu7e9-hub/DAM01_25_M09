<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeeLab Shop – Tickets</title>
    <link rel="stylesheet" type="text/css" href="styles/style.css">
    <script src="scripts/tickets.js" defer></script>
</head>

<body>
    <header>
        <h1>TeeLab Shop</h1>
        <nav>
            <button onclick="window.location.href='cart.html'" title="Cistella">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                </svg>
            </button>
            <button onclick="window.location.href='index.html'" title="Tornar a la botiga">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
            </button>
        </nav>
    </header>

    <main id="tickets-main">
        <div class="tickets-header">
            <h2 class="tickets-section-title">Els meus tickets</h2>
        </div>
        <div class="tickets-wrapper">
            <table id="tickets-table">
                <thead>
                    <tr>
                        <th>ID Comanda</th>
                        <th>Data</th>
                        <th>Articles</th>
                        <th>Total</th>
                        <th>Estat</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="tickets-tbody"></tbody>
            </table>
        </div>
    </main>
</body>

</html>
